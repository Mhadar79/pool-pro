<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pool Pro">
<meta name="theme-color" content="#0a1628">
<title>Pool Pro — בריכה טיפולית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="appHeader">
  <div class="header-right">
    <div class="logo">🌊 <span>Pool</span>Pro</div>
    <div id="syncBadge" class="sync-badge">⏳</div>
  </div>
  <div class="header-center" id="headerDateNav">
    <button class="nav-arrow" onclick="App.shiftDay(-1)">&#8250;</button>
    <div class="header-date" onclick="App.openDatePicker()">
      <span id="hDayName"></span>
      <small id="hDate"></small>
    </div>
    <button class="nav-arrow" onclick="App.shiftDay(1)">&#8249;</button>
  </div>
  <div class="header-left">
    <button class="hbtn" onclick="App.goToday()">היום</button>
    <button class="hbtn hbtn-icon" onclick="App.openPanel('reports')">📊</button>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main id="mainArea">

  <!-- CALENDAR VIEW -->
  <div class="panel active" id="panel-calendar">
    <div id="calendarGrid"></div>
  </div>

  <!-- CLIENTS VIEW -->
  <div class="panel" id="panel-clients">
    <div class="panel-header">
      <h2>👤 ניהול לקוחות</h2>
      <button class="btn-primary btn-sm" onclick="Clients.openAdd()">+ לקוח חדש</button>
    </div>
    <div class="search-wrap">
      <input type="search" id="clientSearch" placeholder="🔍  חיפוש לקוח..." oninput="Clients.render()">
    </div>
    <div id="clientsList"></div>
  </div>

  <!-- REPORTS VIEW -->
  <div class="panel" id="panel-reports">
    <div class="panel-header">
      <h2>📊 דוחות</h2>
    </div>
    <div class="report-tabs">
      <button class="rtab active" onclick="Reports.switch('daily',this)">יומי</button>
      <button class="rtab" onclick="Reports.switch('client',this)">לפי לקוח</button>
      <button class="rtab" onclick="Reports.switch('monthly',this)">חודשי</button>
    </div>
    <div id="reportContent"></div>
  </div>

</main>

<!-- ══ BOTTOM NAV ══ -->
<nav id="bottomNav">
  <button class="ntab active" id="ntab-calendar" onclick="App.openPanel('calendar')">
    <span>📅</span><small>יומן</small>
  </button>
  <button class="ntab" id="ntab-clients" onclick="App.openPanel('clients')">
    <span>👤</span><small>לקוחות</small>
  </button>
  <button class="ntab" id="ntab-reports" onclick="App.openPanel('reports')">
    <span>📊</span><small>דוחות</small>
  </button>
</nav>

<!-- ══ FAB ══ -->
<button class="fab" id="fabBtn" onclick="Appointments.openAdd()">+</button>

<!-- ══ HIDDEN DATE INPUT ══ -->
<input type="date" id="hiddenDatePicker" style="position:fixed;opacity:0;pointer-events:none" onchange="App.setDateFromPicker(this.value)">

<!-- ══ MODALS ══ -->

<!-- APPOINTMENT MODAL -->
<div class="modal-overlay" id="modal-appt">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="apptModalTitle">תור חדש</h3>
      <button class="modal-close" onclick="Modal.close('modal-appt')">✕</button>
    </div>

    <div class="form-tabs">
      <button class="ftab active" id="ftab-private" onclick="Appointments.switchType('private')">🏊 פרטני</button>
      <button class="ftab" id="ftab-group" onclick="Appointments.switchType('group')">👥 קבוצתי</button>
    </div>

    <input type="hidden" id="apptId">
    <input type="hidden" id="apptType" value="private">

    <!-- Private fields -->
    <div id="privateFields">
      <div class="field">
        <label>לקוח *</label>
        <select id="apptClient"><option value="">-- בחר לקוח --</option></select>
      </div>
    </div>

    <!-- Group fields -->
    <div id="groupFields" style="display:none">
      <div class="field">
        <label>שם הקבוצה / השיעור *</label>
        <input type="text" id="groupName" placeholder="אקווה ג׳ים בוקר">
      </div>
      <div class="field">
        <label>משתתפים</label>
        <div id="groupParticipants"></div>
        <button class="btn-ghost btn-sm" style="margin-top:8px" onclick="Appointments.addParticipant()">+ הוסף משתתף</button>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>תאריך *</label>
        <input type="date" id="apptDate">
      </div>
      <div class="field">
        <label>שעה *</label>
        <input type="time" id="apptTime" value="09:00">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>משך (דקות)</label>
        <select id="apptDuration">
          <option value="30">30 דק׳</option>
          <option value="45">45 דק׳</option>
          <option value="60" selected>60 דק׳</option>
          <option value="90">90 דק׳</option>
        </select>
      </div>
      <div class="field">
        <label>מטפלת</label>
        <select id="apptTherapist">
          <option value="t1">מטפלת 1</option>
          <option value="t2">מטפלת 2</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>חזרה</label>
      <select id="apptRecurring">
        <option value="none">חד פעמי</option>
        <option value="weekly">שבועי</option>
        <option value="biweekly">דו שבועי</option>
      </select>
    </div>
    <div class="field">
      <label>הערות</label>
      <input type="text" id="apptNotes" placeholder="הערה...">
    </div>

    <div id="conflictWarning" class="conflict-warn" style="display:none">
      ⚠️ <span id="conflictMsg"></span>
    </div>

    <button class="btn-full" onclick="Appointments.save()">💾 שמור תור</button>
    <button class="btn-full btn-danger" id="deleteApptBtn" onclick="Appointments.delete()" style="display:none;margin-top:8px">🗑️ מחק תור</button>
    <button class="btn-cancel" onclick="Modal.close('modal-appt')">ביטול</button>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="clientModalTitle">לקוח חדש</h3>
      <button class="modal-close" onclick="Modal.close('modal-client')">✕</button>
    </div>
    <input type="hidden" id="clientId">
    <div class="row2">
      <div class="field">
        <label>שם פרטי *</label>
        <input type="text" id="clientFirst" placeholder="ישראל">
      </div>
      <div class="field">
        <label>שם משפחה</label>
        <input type="text" id="clientLast" placeholder="ישראלי">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>טלפון</label>
        <input type="tel" id="clientPhone" placeholder="050-0000000">
      </div>
      <div class="field">
        <label>גיל</label>
        <input type="number" id="clientAge" placeholder="45" min="1" max="120">
      </div>
    </div>
    <div class="field">
      <label>אבחנה / הערות רפואיות</label>
      <textarea id="clientNotes" placeholder="פרטים רלוונטיים..."></textarea>
    </div>
    <div class="field">
      <label>צבע ביומן</label>
      <div id="colorPicker" class="color-picker"></div>
    </div>
    <button class="btn-full" onclick="Clients.save()">💾 שמור לקוח</button>
    <button class="btn-full btn-danger" id="deleteClientBtn" onclick="Clients.delete()" style="display:none;margin-top:8px">🗑️ מחק לקוח</button>
    <button class="btn-cancel" onclick="Modal.close('modal-client')">ביטול</button>
  </div>
</div>

<!-- APPOINTMENT DETAIL MODAL -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
    <button class="btn-cancel" onclick="Modal.close('modal-detail')">סגור</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══ SCRIPTS ══ -->
<script type="module" src="App.js"></script>
</body>
</html>
